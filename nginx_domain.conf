##############################################################
# nginx_domain.conf — Production nginx config for resumeai.bot
# Deploy AFTER domain is connected + SSL obtained.
#
# Usage: cp nginx_domain.conf /etc/nginx/sites-available/resumeai_ssl
#        ln -sf /etc/nginx/sites-available/resumeai_ssl /etc/nginx/sites-enabled/
#        nginx -t && systemctl reload nginx
#
# After running ssl_setup.sh, certbot will modify this file
# automatically to add the SSL certificate paths.
##############################################################

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name resumeai.bot www.resumeai.bot;
    return 301 https://resumeai.bot$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name resumeai.bot www.resumeai.bot;

    # SSL certs — filled by certbot automatically
    # ssl_certificate /etc/letsencrypt/live/resumeai.bot/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/resumeai.bot/privkey.pem;

    root /opt/resumeaibot/landing;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / { try_files $uri $uri/ /index.html; }

    location /app {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /static { proxy_pass http://127.0.0.1:8080; }
}
