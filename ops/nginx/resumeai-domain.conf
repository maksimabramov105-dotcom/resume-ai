##############################################################
# nginx resumeai-domain.conf — production config
# HTTPS + rate limiting + security headers + caching
# Deploy:
#   cp ops/nginx/resumeai-domain.conf /etc/nginx/sites-available/resumeai-domain
#   nginx -t && systemctl reload nginx
#
# Rate-limit zones MUST be in http{} context. If nginx.conf already
# has them, remove the limit_req_zone lines from this file and add
# them only to /etc/nginx/nginx.conf's http{} block.
##############################################################

# Put these in /etc/nginx/nginx.conf http{} block (if not already present):
#   limit_req_zone $binary_remote_addr zone=api:10m  rate=10r/s;
#   limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;
#
# They cannot live inside a server{} block — add them via:
#   /etc/nginx/conf.d/rate_limit.conf  (nginx reads *.conf from conf.d/)

server {
    server_name resumeai-bot.ru www.resumeai-bot.ru;

    root /opt/resumeaibot/landing;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_types text/css application/javascript application/json text/plain text/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Security headers ───────────────────────────────────────
    add_header Strict-Transport-Security "max-age=15552000" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Verification / SEO files ───────────────────────────────
    location = /googleb197c4f86a29a5e6.html { try_files $uri =404; }
    location = /yandex_517f85300deb8311.html { try_files $uri =404; }
    location = /sitemap.xml { try_files $uri =404; }
    location = /robots.txt  { try_files $uri =404; }

    # ── Auth endpoints — 2 req/s, burst 5 ─────────────────────
    location ~* ^/api/(login|auth/login|register|auth/register|auth/vk-login|forgot-password)$ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── General API — 10 req/s, burst 20 ──────────────────────
    location /api {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── AutoApply SPA ──────────────────────────────────────────
    location /app {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Static assets (7-day cache) ───────────────────────────
    location /static {
        proxy_pass http://127.0.0.1:8080;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Blog ──────────────────────────────────────────────────
    location ~* ^/blog/[a-zA-Z0-9_-]+(/)?$ {
        try_files $uri $uri/index.html /blog/_placeholder/index.html;
        expires 1d;
    }

    # ── Block hidden files ─────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Landing page (root) ────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ── SSL (managed by certbot — do not edit manually) ───────
    listen 443 ssl;
    ssl_certificate     /etc/letsencrypt/live/resumeai-bot.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/resumeai-bot.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.resumeai-bot.ru) { return 301 https://$host$request_uri; }
    if ($host = resumeai-bot.ru)     { return 301 https://$host$request_uri; }
    listen 80;
    server_name resumeai-bot.ru www.resumeai-bot.ru;
    return 404;
}
