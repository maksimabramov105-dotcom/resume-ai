<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResumeAI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: Inter, -apple-system, sans-serif;
      font-size: 13px;
      background: #fff;
      color: #1e293b;
    }
    .header {
      background: #5B73FF;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header span { font-size: 11px; opacity: 0.8; }
    .body { padding: 16px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #64748b;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    label:first-of-type { margin-top: 0; }
    input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #5B73FF; }
    .row { display: flex; gap: 8px; }
    .row > div { flex: 1; }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 9px;
      background: #5B73FF;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #4a60e8; }
    #status {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: #16a34a;
      min-height: 16px;
    }
    .footer {
      border-top: 1px solid #f1f5f9;
      padding: 10px 16px;
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
    }
    .footer a { color: #5B73FF; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>ResumeAI</h1>
      <span>Auto-fill job applications</span>
    </div>
  </div>

  <div class="body">
    <div class="row">
      <div>
        <label for="firstName">First name</label>
        <input id="firstName" type="text" placeholder="Jane" />
      </div>
      <div>
        <label for="lastName">Last name</label>
        <input id="lastName" type="text" placeholder="Smith" />
      </div>
    </div>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="jane@example.com" />

    <label for="phone">Phone</label>
    <input id="phone" type="tel" placeholder="+1 555 000 0000" />

    <label for="location">Location</label>
    <input id="location" type="text" placeholder="San Francisco, CA" />

    <label for="currentCompany">Current company</label>
    <input id="currentCompany" type="text" placeholder="Acme Inc." />

    <label for="linkedin">LinkedIn URL</label>
    <input id="linkedin" type="url" placeholder="https://linkedin.com/in/janesmith" />

    <button id="saveBtn">Save profile</button>
    <div id="status"></div>
  </div>

  <div class="footer">
    Also use <a href="https://t.me/topbestworkerbot" target="_blank">@topbestworkerbot</a> on Telegram
  </div>

  <script src="popup.js"></script>
</body>
</html>
