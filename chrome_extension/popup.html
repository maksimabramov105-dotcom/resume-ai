<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>АвтоОтклик</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --card2: #1a1a1a;
      --accent: #7c3aed;
      --accent-light: #9f5cf7;
      --accent-dim: rgba(124, 58, 237, 0.15);
      --text: #f0f0f0;
      --text-muted: #888;
      --border: #2a2a2a;
      --green: #22c55e;
      --red: #ef4444;
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      min-height: 200px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-light), #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }

    .logo span {
      font-size: 10px;
      font-weight: 400;
      color: var(--text-muted);
      -webkit-text-fill-color: var(--text-muted);
      background: none;
      margin-left: 6px;
    }

    /* ── Login form ── */
    .login-section {
      padding: 18px;
    }

    .login-section h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text);
    }

    .login-section p {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 10px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .form-group input {
      width: 100%;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
    }

    .form-group input::placeholder {
      color: #555;
    }

    .btn {
      width: 100%;
      padding: 9px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      margin-top: 4px;
    }

    .btn:hover { background: var(--accent-light); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-weight: 400;
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--accent-dim);
    }

    /* ── Error message ── */
    .error-msg {
      font-size: 11px;
      color: var(--red);
      margin-top: 8px;
      display: none;
    }

    /* ── Dashboard ── */
    .dashboard {
      padding: 16px 18px;
    }

    /* Plan badge */
    .plan-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .user-email {
      font-size: 11px;
      color: var(--text-muted);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .plan-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .plan-free   { background: #1e1e1e; color: #888; border: 1px solid #333; }
    .plan-start  { background: rgba(34,197,94,0.12); color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }
    .plan-pro    { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }
    .plan-unlimited { background: linear-gradient(135deg, rgba(251,191,36,0.15), rgba(249,115,22,0.15)); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }

    /* Stats card */
    .stats-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .stats-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .stats-row {
      display: flex;
      gap: 0;
    }

    .stat-item {
      flex: 1;
      text-align: center;
    }

    .stat-item + .stat-item {
      border-left: 1px solid var(--border);
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* Status indicator */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.inactive { background: #444; }

    .status-text {
      font-size: 12px;
      font-weight: 500;
      flex: 1;
    }

    /* Actions */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-open {
      background: var(--accent-dim);
      border: 1px solid rgba(124,58,237,0.3);
      color: var(--accent-light);
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      display: block;
      padding: 9px 14px;
      border-radius: 7px;
      font-size: 13px;
      transition: background 0.2s, border-color 0.2s;
      cursor: pointer;
    }

    .btn-open:hover {
      background: rgba(124,58,237,0.25);
      border-color: rgba(124,58,237,0.5);
    }

    /* Footer */
    .footer {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .version {
      font-size: 10px;
      color: #444;
    }

    .footer-link {
      font-size: 10px;
      color: var(--text-muted);
      text-decoration: none;
    }

    .footer-link:hover { color: var(--accent-light); }

    /* Loading spinner */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 18px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">АвтоОтклик <span>by resumeai.bot</span></div>
  </div>

  <!-- Loading -->
  <div id="loadingSection" class="loading">
    <div class="spinner"></div>
  </div>

  <!-- Login -->
  <div id="loginSection" class="login-section hidden">
    <h2>Войдите в аккаунт</h2>
    <p>Используйте данные от resumeai.bot / autoapply</p>

    <div class="form-group">
      <label for="emailInput">Email</label>
      <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="passwordInput">Пароль</label>
      <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn" id="loginBtn">Войти</button>
    <div class="error-msg" id="loginError"></div>
  </div>

  <!-- Dashboard -->
  <div id="dashboardSection" class="dashboard hidden">
    <div class="plan-row">
      <div class="user-email" id="userEmail">—</div>
      <div class="plan-badge" id="planBadge">free</div>
    </div>

    <div class="stats-card">
      <div class="stats-title">Статистика откликов</div>
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-value" id="statToday">0</div>
          <div class="stat-label">сегодня</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-label">всего</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statCampaigns">0</div>
          <div class="stat-label">кампаний</div>
        </div>
      </div>
    </div>

    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Проверяем...</div>
    </div>

    <div class="actions">
      <a class="btn-open" href="http://72.56.250.53/app" target="_blank" id="openDashboardBtn">
        Открыть панель управления →
      </a>
      <button class="btn btn-ghost" id="logoutBtn">Отключить</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="version">v1.0.0</span>
    <a class="footer-link" href="https://resumeai.bot" target="_blank">resumeai.bot</a>
  </div>

  <script>
    const API_BASE = 'http://72.56.250.53';

    const loadingSection  = document.getElementById('loadingSection');
    const loginSection    = document.getElementById('loginSection');
    const dashboardSection = document.getElementById('dashboardSection');
    const loginBtn        = document.getElementById('loginBtn');
    const loginError      = document.getElementById('loginError');
    const logoutBtn       = document.getElementById('logoutBtn');
    const emailInput      = document.getElementById('emailInput');
    const passwordInput   = document.getElementById('passwordInput');

    function showSection(name) {
      loadingSection.classList.add('hidden');
      loginSection.classList.add('hidden');
      dashboardSection.classList.add('hidden');
      if (name === 'loading')   loadingSection.classList.remove('hidden');
      if (name === 'login')     loginSection.classList.remove('hidden');
      if (name === 'dashboard') dashboardSection.classList.remove('hidden');
    }

    function setPlanBadge(plan) {
      const el = document.getElementById('planBadge');
      el.textContent = plan || 'free';
      el.className = 'plan-badge plan-' + (plan || 'free');
    }

    function setStatus(active, label) {
      const dot  = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      dot.className  = 'status-dot ' + (active ? 'active' : 'inactive');
      text.textContent = label;
    }

    async function loadDashboard(token) {
      try {
        const resp = await fetch(`${API_BASE}/api/dashboard`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!resp.ok) throw new Error('auth_failed');
        const data = await resp.json();

        document.getElementById('userEmail').textContent = data.email || '—';
        document.getElementById('statToday').textContent = data.today_count ?? 0;
        document.getElementById('statTotal').textContent = data.total_count ?? 0;
        document.getElementById('statCampaigns').textContent = data.active_campaigns ?? 0;
        setPlanBadge(data.plan);

        if (data.active_campaigns > 0) {
          setStatus(true, `Активна — ${data.active_campaigns} кампани${data.active_campaigns === 1 ? 'я' : 'и'}`);
        } else {
          setStatus(false, 'Нет активных кампаний');
        }

        showSection('dashboard');
      } catch (e) {
        if (e.message === 'auth_failed') {
          await chrome.storage.local.remove(['aa_token', 'aa_user_id']);
          showSection('login');
        } else {
          // Network error — show dashboard with cached plan info
          const stored = await chrome.storage.local.get(['aa_plan', 'aa_email']);
          document.getElementById('userEmail').textContent = stored.aa_email || '—';
          setPlanBadge(stored.aa_plan || 'free');
          setStatus(false, 'Нет соединения с сервером');
          showSection('dashboard');
        }
      }
    }

    async function init() {
      showSection('loading');
      const stored = await chrome.storage.local.get(['aa_token', 'aa_user_id']);
      if (stored.aa_token) {
        await loadDashboard(stored.aa_token);
      } else {
        showSection('login');
      }
    }

    loginBtn.addEventListener('click', async () => {
      const email    = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) {
        loginError.textContent = 'Введите email и пароль';
        loginError.style.display = 'block';
        return;
      }
      loginBtn.disabled = true;
      loginBtn.textContent = 'Входим...';
      loginError.style.display = 'none';

      try {
        const resp = await fetch(`${API_BASE}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await resp.json();
        if (!resp.ok) {
          loginError.textContent = data.detail || 'Неверный email или пароль';
          loginError.style.display = 'block';
          return;
        }
        await chrome.storage.local.set({
          aa_token:   data.token,
          aa_user_id: data.user_id,
          aa_email:   email
        });
        await loadDashboard(data.token);
      } catch (e) {
        loginError.textContent = 'Ошибка соединения. Проверьте интернет.';
        loginError.style.display = 'block';
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Войти';
      }
    });

    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });

    logoutBtn.addEventListener('click', async () => {
      await chrome.storage.local.remove(['aa_token', 'aa_user_id', 'aa_email', 'aa_plan']);
      showSection('login');
      emailInput.value = '';
      passwordInput.value = '';
    });

    init();
  </script>
</body>
</html>
