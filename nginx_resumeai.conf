##############################################################
# nginx_resumeai.conf
# Serves landing page on port 80 + proxies /app and /api to
# AutoApply FastAPI (port 8080). Deploy to:
#   /etc/nginx/sites-available/resumeai
# Then: ln -sf /etc/nginx/sites-available/resumeai /etc/nginx/sites-enabled/resumeai
#       nginx -t && systemctl reload nginx
##############################################################

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;   # catches all hostnames including bare IP

    root /opt/resumeaibot/landing;
    index index.html;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/css application/javascript application/json text/plain text/xml;
    gzip_min_length 1024;

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;

    # ── Landing page (root) ───────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── robots.txt / sitemap.xml (static SEO files) ──────────
    location ~* \.(txt|xml)$ {
        try_files $uri =404;
    }

    # ── Blog post pages — serve _placeholder shell for all slugs
    location ~* ^/blog/[a-zA-Z0-9_-]+(/)?$ {
        try_files $uri $uri/index.html /blog/_placeholder/index.html;
    }

    # ── AutoApply SPA and API (proxy to FastAPI :8080) ────────
    location /app {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /api {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /static {
        proxy_pass http://127.0.0.1:8080;
    }

    # ── Streamlit analytics dashboard (SSH tunnel to 8501) ───
    # To expose publicly: uncomment below + add auth
    # location /dashboard {
    #     proxy_pass http://127.0.0.1:8501;
    # }
}
