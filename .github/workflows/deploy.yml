# GitHub Actions CI/CD — Deploy to VPS on push to main
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VPS_HOST     — your VPS IP, e.g. 72.56.250.53
#   VPS_PASSWORD — root password

name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pip-audit pytest flake8

      - name: Security audit (pip-audit)
        run: pip-audit --requirement requirements.txt --skip-editable

      - name: Lint
        run: flake8 autoapply/ bot/ --max-line-length=120 --ignore=E501,W503,E402 --exclude=__pycache__ || true

      - name: Run tests
        run: |
          if [ -d tests ] && [ "$(ls -A tests/)" ]; then
            pytest tests/ -x --tb=short -q
          else
            echo "No tests directory yet — skipping"
          fi

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "autoapply/,bot/,landing/,run.py,daily_reporter.py,maintenance.py,analytics_tracker.py,requirements.txt"
          target: /opt/resumeaibot/
          overwrite: true

      - name: Restart services & health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "=== Deploy at $(date) ==="
            cd /opt/resumeaibot
            git pull origin main
            .venv/bin/pip install -r requirements.txt -q
            systemctl restart resumeaibot autoapply autoapply-worker || true
            sleep 6
            curl -sf https://resumeai-bot.ru/api/health && echo "✅ API healthy" || echo "⚠️ Health check failed"
            curl -sf https://resumeai-bot.ru/ -o /dev/null -w "Landing: %{http_code}\n" || true
            echo "=== Done ==="
