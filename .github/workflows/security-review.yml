name: Security Review

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main, master]

permissions:
  contents: read
  security-events: write  # required for SARIF upload (Bandit, CodeQL)

jobs:
  security-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit (Python security linter)
        uses: PyCQA/bandit-action@v1
        with:
          targets: "."
          severity: medium      # fix: was 'level' (not a valid input)
          confidence: medium
        continue-on-error: true # fix: 'exit_zero' input doesn't exist — use continue-on-error instead

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@v3.95.2  # latest stable
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified  # fix: removed --debug (noisy)
        continue-on-error: true

      - name: Dependency audit (pip-audit)
        run: |
          pip install pip-audit -q
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969 || true
        continue-on-error: true
